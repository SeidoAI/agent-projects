# Default spawn configuration. Projects override via
# project.yaml.spawn_defaults or <project>/.tripwire/spawn/defaults.yaml.
# Sessions override via session.yaml.spawn_config.
# Precedence: session > project > tripwire default.

invocation:
  command: claude
  runtime: subprocess
  background: true
  log_path_template: "~/.tripwire/logs/{project_slug}/{session_id}-{timestamp}.log"

config:
  model: opus
  fallback_model: sonnet
  effort: max
  permission_mode: bypassPermissions
  # AskUserQuestion and SendUserMessage block in -p mode (no TTY to answer)
  # and the agent will retry-loop until max-turns. Disallow upfront so the
  # agent falls back to plain-text stop-and-ask.
  disallowed_tools: [Agent, AskUserQuestion, SendUserMessage]
  max_turns: 200
  max_budget_usd: 50
  output_format: stream-json

prompt_template: |
  {plan}

  You are the {agent} agent for session {session_id}.
  Execute the plan. Stop at stop-and-ask points.

  You are running headless (claude -p). Do not attempt to use
  AskUserQuestion or SendUserMessage — those tools are disallowed in
  this environment and will fail. If you need clarification, write
  your question as plain text in your final response and stop. The
  PM will read the log, update the plan, and respawn you.

  Exit protocol — how you signal you're done:

  CLAUDE.md lists your worktrees. For every worktree that has commits
  ahead of its base branch, before you stop:

  1. `git push origin <branch>` from that worktree.
  2. `gh pr create --repo <repo> --base <base-branch> --head <branch>
     --title '{branch_type}({session_id}): {session_name}' --body ...`
     where <body> summarises the work in that worktree.
  3. If there are two PRs (code + project-tracking), cross-link them
     in the PR bodies.

  PR-open is your exit signal. Once every dirty worktree has a PR, you
  are done. The PM reviews and merges; `tripwire session complete`
  verifies the merges and closes the session.

  Before you end the session: ask honestly — did you learn anything future
  agents in this area would benefit from inheriting? Not "what did I do"
  (that's developer.md) but "what insight would I want the next agent
  working near this to start from?" If yes, propose it in insights.yaml
  as a node addition or update. For new_node proposals, set `type:` to
  one of the project's active node_type enum values (e.g. `decision`,
  `contract`, `pattern`). If nothing qualifies — if every insight is
  either obvious, already in a node, or specific to this session —
  leave the file absent. Do not force it.

resume_prompt_template: |
  Resuming session {session_id}.

  The PM has likely updated the plan at {plan_path} to address the
  question you raised previously. Re-read that file (especially any
  `## PM follow-up` section) before continuing.

  Your previous conversation is preserved — you have the full context
  of what you've already tried. Continue from where you stopped.

  The exit protocol is unchanged: when your work is done, push +
  open a PR from every dirty worktree. If you're still blocked by
  something the PM's update did not resolve, write your question as
  plain text and stop — the PM will update the plan again.

system_prompt_append: |
  tripwire session: {session_id}; project: {project_slug}
  If context is getting heavy, use /compact to free space.
  Do not use the Agent tool — you are a single-agent session.
  Do not use /batch — the work is already decomposed in your plan.
